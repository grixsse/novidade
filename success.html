<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem Enviada! - Grixs</title>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <!-- Inclua seu código do Google Analytics aqui também! -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFBCCVCHQY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GFBCCVCHQY');
  </script>
  <style>
    /* Seu CSS existente ou um CSS básico para esta página */
    :root {
      --primary-color: #02d3cc;
      --secondary-color: #091127;
      --accent-color: #ffffff;
      --text-color: #ffffff;
      --background-gradient: linear-gradient(135deg, #091127 0%, #02d3cc 100%);
    }
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--background-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: 20px;
    }
    h1 {
      color: var(--primary-color);
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .home-button {
      display: inline-block;
      background-color: var(--primary-color);
      color: var(--secondary-color);
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
    }
    .home-button:hover {
      background-color: #01b5af;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Obrigado!</h1>
    <p>Sua mensagem foi enviada com sucesso. Entraremos em contato em breve.</p>
    <a href="index.html" class="home-button">Voltar para a Página Inicial</a>
  </div>
</body>
</html>
