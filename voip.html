<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grixs - Rede Estruturada</title>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    :root {
      --primary-color: #02d3cc;
      --secondary-color: #091127;
      --accent-color: #ffffff;
      --text-color: #ffffff;
      --background-gradient: linear-gradient(135deg, #091127 0%, #02d3cc 100%);
    }

    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--background-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex; /* Mantém o footer no fim da tela */
      flex-direction: column; /* Organiza header, main, footer verticalmente */
    }

    header {
      background-color: rgba(9, 17, 39, 0.8);
      padding: 20px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
    }

    .logo img {
      margin-right: 10px;
      height: 40px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: var(--text-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--primary-color);
    }

    main {
      flex: 1; /* Faz o conteúdo ocupar o espaço restante */  
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      font-size: 40px;
    }

    p {
      text-align: center;
      font-size: 18px;
    }

    /* Botão voltar */
    .back-button {
      display: inline-block;
      margin: 20px 0;
      padding: 10px 20px;
      background-color: var(--primary-color);
      color: var(--secondary-color);
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .back-button:hover {
      background-color: #00b3ad;
      transform: scale(1.05);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease-in-out;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      animation: zoomIn 0.3s ease-in-out;
    }

    .lightbox.active {
      display: flex;
    }

    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .close-lightbox:hover {
      color: var(--primary-color);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    footer {
      background-color: rgba(9, 17, 39, 0.8);
      color: var(--text-color);
      text-align: center;
      padding: 20px 0;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">
        <img src="logo.png" alt="Logo">
        Grixs
      </div>
      <div class="nav-links">
        <a href="index.html">Início</a>
        <a href="cameras.html">Câmeras</a>
        <a href="voip.html">Telefonia</a>
        <a href="fiber.html">Fibra Ótica</a>
        <a href="wifi.html">Wi-Fi</a>
      </div>
    </nav>
  </header>

  <main>
    <h1>Rede Estruturada</h1>

    <p>Projetos e instalação de redes estruturadas com desempenho, organização e confiabilidade para sua empresa.</p>

    <div class="gallery">
        <img src="voip/voip1.jpg" alt="Central telefônica VoIP instalada em empresa">
        <img src="voip/voip2.jpg" alt="Equipamentos de telefonia IP em rack de TI">
        <img src="voip/voip3.jpg" alt="Configuração de sistema VoIP corporativo">
        <img src="voip/voip4.jpg" alt="Telefonia em rede integrada VoIP">
    </div>

    <div style="text-align: center;">
      <a href="index.html" class="back-button">← Voltar</a>
    </div>

  </main>

  <footer>
    <p>&copy; 2025 Grixs - Soluções com Tecnologia. Todos os direitos reservados.</p>
  </footer>

  <script>
    const lightbox = document.createElement('div');
    lightbox.id = 'lightbox';
    lightbox.classList.add('lightbox');
    lightbox.innerHTML = `
      <span class="close-lightbox">&times;</span>
      <img src="" alt="Imagem Ampliada">
    `;
    document.body.appendChild(lightbox);

    const lightboxImg = lightbox.querySelector('img');
    const closeBtn = lightbox.querySelector('.close-lightbox');

    document.querySelectorAll('.gallery img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.add('active');
      });
    });

    closeBtn.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
      }
    });
  </script>
</body>
</html>
